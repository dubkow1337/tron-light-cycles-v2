<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRON 3D — Light Cycles</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ===== СПЛАШ-ЭКРАН ===== -->
    <div id="splashScreen" class="splash active">
        <div class="splash-content">
            <div class="splash-title">
                <span class="splash-tron">TRON</span>
                <span class="splash-sub">LIGHT CYCLES</span>
            </div>
            <button id="splashEnterBtn" class="splash-btn">
                <span class="btn-text">ВОЙТИ В СИСТЕМУ</span>
                <span class="btn-scan"></span>
            </button>
            <div class="splash-version">v3.0 // 3D ENGINE</div>
        </div>
    </div>

    <!-- ===== МЕНЮ ===== -->
    <div id="menuScreen" class="menu-screen">
        <div class="menu-wrapper">
            <div class="menu-header">
                <h1 class="menu-title">TRON</h1>
                <p class="menu-sub">LIGHT CYCLES</p>
                <div class="menu-divider"></div>
            </div>
            <div class="menu-modules">
                <div class="menu-module">
                    <div class="module-label">ПРОТИВНИК</div>
                    <div class="module-buttons">
                        <button id="menuOpponent2p" class="module-btn" data-group="opponent">ДВА ИГРОКА</button>
                        <button id="menuOpponentAI" class="module-btn" data-group="opponent">VS ИИ</button>
                    </div>
                </div>
                <div class="menu-module">
                    <div class="module-label">РЕЖИМ</div>
                    <div class="module-buttons">
                        <button id="menuMatchClassic" class="module-btn" data-group="match">КЛАССИКА</button>
                        <button id="menuMatchTournament" class="module-btn" data-group="match">ТУРНИР</button>
                        <button id="menuMatchSurvival" class="module-btn" data-group="match">ВЫЖИВАНИЕ</button>
                    </div>
                </div>
            </div>
            <button id="menuPlayBtn" class="menu-start-btn">
                <span class="start-text">ЗАПУСТИТЬ</span>
                <span class="start-scan"></span>
            </button>
            <div class="menu-footer">
                <button id="menuSoundToggle" class="footer-sound">ЗВУК</button>
                <span class="footer-status">СИСТЕМА ГОТОВА</span>
                <span class="footer-record">РЕКОРД: <span id="menuRecordDisplay">0</span></span>
            </div>
        </div>
    </div>

    <!-- ===== 3D ИГРОВОЙ КОНТЕЙНЕР ===== -->
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <!-- UI ПОВЕРХ 3D -->
        <div id="gameUI">
            <div class="game-top-panel">
                <button id="backToMenuBtn" class="back-btn">← НАЗАД</button>
                <div class="game-score">
                    <div class="score blue">
                        <span class="score-label">СИНИЙ</span>
                        <span id="gamePlayer1Score" class="score-value">0</span>
                    </div>
                    <div class="score-divider">:</div>
                    <div id="roundTimer" class="round-timer">30</div>
                    <div class="score-divider">:</div>
                    <div class="score orange">
                        <span class="score-label">ОРАНЖЕВЫЙ</span>
                        <span id="gamePlayer2Score" class="score-value">0</span>
                    </div>
                </div>
                <button id="restartGameBtn" class="restart-btn">ИГРАТЬ СНОВА</button>
            </div>
            <div id="gameMessage" class="game-message"></div>
            <div id="victoryOverlay" class="victory-overlay"></div>
        </div>
    </div>

    <!-- ===== ЗАГРУЗКА THREE.JS ===== -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <!-- ===== СКРИПТЫ ===== -->
    <script type="module" src="js/main.js"></script>
    <script src="js/sounds.js"></script>
    <script src="js/ui.js"></script>
</body>
</html>
